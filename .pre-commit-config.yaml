# pre-commit hooks for bwv.
#
# Go checks run against the system-installed toolchain (language: system) so
# they use the same golangci-lint (v2) and go versions you run by hand - no
# separately-pinned copies to drift.
#
#   pre-commit install                       # commit-stage hooks
#   pre-commit install --hook-type pre-push  # push-stage hooks (modernize)
#
# Run everything manually with: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      # The lint gate: staticcheck, errcheck, govet, ineffassign, unused,
      # gocyclo/gocognit and the gofmt/goimports formatters, per .golangci.yml.
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        types: [go]
        language: system
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./...
        types: [go]
        language: system
        pass_filenames: false

      # modernize is not bundled in golangci-lint; run it on push where the
      # extra cost (it may fetch a newer toolchain) is tolerable.
      - id: modernize
        name: go modernize
        entry: go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@v0.23.0 ./...
        types: [go]
        language: system
        pass_filenames: false
        stages: [pre-push]
